# Cloudflare Workers (static assets) configuration for the PDQ CRM promo site.
#
# This is a static SPA. The Cloudflare project deploys with `npx wrangler deploy`,
# which serves the built ./dist directory as a static-asset Worker (no server
# code). `not_found_handling = "single-page-application"` makes any unknown path
# fall back to index.html so deep links / refreshes work.
#
# Local preview of the production build: `npm run build && npm run preview`.
name = "pdq-promo"
compatibility_date = "2025-01-01"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
